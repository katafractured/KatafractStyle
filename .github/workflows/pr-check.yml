name: pr-check
on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, macOS, ios-build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Xcode project
        id: proj
        run: |
          if [ -f project.yml ]; then
            command -v xcodegen >/dev/null || { echo "xcodegen missing"; exit 1; }
            xcodegen generate
          fi
          PROJ=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          [ -z "$PROJ" ] && PROJ=$(ls -d *.xcodeproj 2>/dev/null | head -1)
          [ -z "$PROJ" ] && { echo "no xcworkspace/xcodeproj found"; exit 1; }
          if [[ "$PROJ" == *.xcworkspace ]]; then
            FLAG="-workspace"
          else
            FLAG="-project"
          fi
          SCHEME=$(xcodebuild -list "$FLAG" "$PROJ" 2>/dev/null | awk '/Schemes:/{flag=1; next} flag && NF{print $1; exit}')
          [ -z "$SCHEME" ] && { echo "no scheme detected"; exit 1; }
          echo "flag=$FLAG" >> "$GITHUB_OUTPUT"
          echo "proj=$PROJ" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Build (no signing)
        run: |
          xcodebuild build \
            ${{ steps.proj.outputs.flag }} "${{ steps.proj.outputs.proj }}" \
            -scheme "${{ steps.proj.outputs.scheme }}" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            | xcbeautify --renderer github-actions || \
          xcodebuild build \
            ${{ steps.proj.outputs.flag }} "${{ steps.proj.outputs.proj }}" \
            -scheme "${{ steps.proj.outputs.scheme }}" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=
